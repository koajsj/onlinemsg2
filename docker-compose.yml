networks:
  openim:
    driver: bridge

services:
  mongo:
    image: "${MONGO_IMAGE}"
    container_name: private-chat-mongo
    environment:
      TZ: Asia/Shanghai
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: openim_v3
      OPENIM_MONGO_USERNAME: ${MONGO_USERNAME}
      OPENIM_MONGO_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - ./data/components/mongodb/db:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    restart: always
    networks:
      - openim

  redis:
    image: "${REDIS_IMAGE}"
    container_name: private-chat-redis
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--appendonly",
        "yes"
      ]
    volumes:
      - ./data/components/redis:/data
    restart: always
    networks:
      - openim

  etcd:
    image: "${ETCD_IMAGE}"
    container_name: private-chat-etcd
    ports:
      - "12379:2379"
      - "12380:2380"
    environment:
      ETCD_NAME: s1
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_CLUSTER: s1=http://0.0.0.0:2380
      ETCD_INITIAL_CLUSTER_TOKEN: tkn
      ETCD_INITIAL_CLUSTER_STATE: new
      ALLOW_NONE_AUTHENTICATION: "yes"
    volumes:
      - ./data/components/etcd:/etcd-data
    restart: always
    networks:
      - openim

  kafka:
    image: "${KAFKA_IMAGE}"
    container_name: private-chat-kafka
    user: root
    restart: always
    environment:
      TZ: Asia/Shanghai
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://kafka:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
    volumes:
      - ./data/components/kafka:/bitnami/kafka
    networks:
      - openim

  minio:
    image: "${MINIO_IMAGE}"
    container_name: private-chat-minio
    command: minio server /data --console-address ':9090'
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_ACCESS_KEY}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9090"
    volumes:
      - ./data/components/minio:/data
    restart: always
    networks:
      - openim

  openim-server:
    image: "${OPENIM_SERVER_IMAGE}"
    container_name: private-chat-openim
    init: true
    depends_on:
      - mongo
      - redis
      - etcd
      - kafka
      - minio
    environment:
      IMENV_MONGODB_ADDRESS: ${MONGO_ADDRESS}
      IMENV_MONGODB_USERNAME: ${MONGO_USERNAME}
      IMENV_MONGODB_PASSWORD: ${MONGO_PASSWORD}
      IMENV_KAFKA_ADDRESS: ${KAFKA_ADDRESS}
      IMENV_DISCOVERY_ETCD_ADDRESS: ${ETCD_ADDRESS}
      IMENV_REDIS_ADDRESS: ${REDIS_ADDRESS}
      IMENV_REDIS_PASSWORD: ${REDIS_PASSWORD}
      IMENV_MINIO_INTERNALADDRESS: ${MINIO_INTERNAL_ADDRESS}
      IMENV_MINIO_EXTERNALADDRESS: ${MINIO_EXTERNAL_ADDRESS}
      IMENV_MINIO_ACCESSKEYID: ${MINIO_ACCESS_KEY_ID}
      IMENV_MINIO_SECRETACCESSKEY: ${MINIO_SECRET_ACCESS_KEY}
      IMENV_SHARE_SECRET: ${OPENIM_SECRET}
      IMENV_LOG_ISSTDOUT: "true"
      IMENV_LOG_REMAINLOGLEVEL: "3"
      IMENV_OPENIM_API_PROMETHEUS_GRAFANAURL: http://${SERVER_PUBLIC_HOST}:${GRAFANA_PORT}/
    ports:
      - "${OPENIM_MSG_GATEWAY_PORT}:10001"
      - "${OPENIM_API_PORT}:10002"
    healthcheck:
      test: ["CMD", "sh", "-c", "mage check"]
      interval: 10s
      timeout: 60s
      retries: 12
    restart: always
    networks:
      - openim

  app-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: private-chat-api
    depends_on:
      openim-server:
        condition: service_started
    environment:
      NODE_ENV: production
      APP_DOMAIN: ${APP_DOMAIN}
      APP_API_PORT: ${APP_API_PORT}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRES_IN: ${APP_JWT_EXPIRES_IN}
      APP_MAX_UPLOAD_SIZE: ${APP_MAX_UPLOAD_SIZE}
      APP_MAX_ATTACHMENT_SIZE: ${APP_MAX_ATTACHMENT_SIZE}
      APP_VERSION: ${APP_VERSION}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      OPENIM_API_URL: http://openim-server:10002
      OPENIM_SECRET: ${OPENIM_SECRET}
      OPENIM_ADMIN_USER_ID: ${OPENIM_ADMIN_USER_ID}
      OPENIM_PLATFORM_ID: ${OPENIM_PLATFORM_ID}
      APP_DATA_DIR: data/runtime
      APP_UPLOAD_DIR: data/uploads
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: always
    networks:
      - openim

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: private-chat-web
    depends_on:
      app-api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: always
    networks:
      - openim
